<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Clientes | Sistema de Aluguel de Carros</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .table thead th { background-color: #343a40; color: #fff; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/clientes/"><i class="bi bi-car-front-fill me-2"></i>Aluguel de Carros</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="/clientes/"><i class="bi bi-people me-1"></i>Clientes</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-people me-2"></i>Clientes</h2>
        <a href="/clientes/novo" class="btn btn-primary">
            <i class="bi bi-person-plus me-1"></i>Novo Cliente
        </a>
    </div>

    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

    <div th:if="${#lists.isEmpty(clientes)}" class="alert alert-info">
        Nenhum cliente cadastrado. <a href="/clientes/novo">Cadastre o primeiro.</a>
    </div>

    <div th:unless="${#lists.isEmpty(clientes)}" class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover table-striped mb-0">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>RG</th>
                        <th>Profissão</th>
                        <th class="text-center">Rendimentos</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${clientes}">
                        <td th:text="${c.nome}"></td>
                        <td th:text="${c.cpf}"></td>
                        <td th:text="${c.rg}"></td>
                        <td th:text="${c.profissao}"></td>
                        <td class="text-center" th:text="${#lists.size(c.rendimentos)}"></td>
                        <td class="text-center">
                            <a th:href="@{/clientes/{id}(id=${c.id})}" class="btn btn-sm btn-outline-secondary me-1" title="Ver">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/clientes/{id}/editar(id=${c.id})}" class="btn btn-sm btn-outline-primary me-1" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/clientes/{id}/deletar(id=${c.id})}" method="post" class="d-inline"
                                  onsubmit="return confirm('Confirma exclusão do cliente?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger" title="Excluir">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
