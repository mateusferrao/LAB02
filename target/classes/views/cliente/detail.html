<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${cliente.nome} + ' | Sistema de Aluguel de Carros'">Cliente | Sistema de Aluguel de Carros</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .label-col { font-weight: 600; color: #495057; width: 160px; }
        .table thead th { background-color: #343a40; color: #fff; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/clientes/"><i class="bi bi-car-front-fill me-2"></i>Aluguel de Carros</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="/clientes/"><i class="bi bi-people me-1"></i>Clientes</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5" style="max-width: 760px;">
    <div class="d-flex align-items-center mb-3">
        <a href="/clientes/" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h2 class="mb-0" th:text="${cliente.nome}">Nome do Cliente</h2>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold">
            <i class="bi bi-person me-2"></i>Dados Pessoais
        </div>
        <div class="card-body">
            <table class="table table-borderless mb-0">
                <tbody>
                    <tr>
                        <td class="label-col">Nome</td>
                        <td th:text="${cliente.nome}"></td>
                    </tr>
                    <tr>
                        <td class="label-col">CPF</td>
                        <td th:text="${cliente.cpf}"></td>
                    </tr>
                    <tr>
                        <td class="label-col">RG</td>
                        <td th:text="${cliente.rg}"></td>
                    </tr>
                    <tr>
                        <td class="label-col">Endereço</td>
                        <td th:text="${cliente.endereco}"></td>
                    </tr>
                    <tr>
                        <td class="label-col">Profissão</td>
                        <td th:text="${cliente.profissao}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold">
            <i class="bi bi-cash-stack me-2"></i>Rendimentos
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(cliente.rendimentos)}" class="p-3 text-muted">
                Nenhum rendimento informado.
            </div>
            <table th:unless="${#lists.isEmpty(cliente.rendimentos)}" class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Fonte</th>
                        <th class="text-end">Valor</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${cliente.rendimentos}">
                        <td th:text="${r.fonte}"></td>
                        <td class="text-end" th:text="${r.valor}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex gap-2">
        <a th:href="@{/clientes/{id}/editar(id=${cliente.id})}" class="btn btn-primary">
            <i class="bi bi-pencil me-1"></i>Editar
        </a>
        <form th:action="@{/clientes/{id}/deletar(id=${cliente.id})}" method="post"
              onsubmit="return confirm('Confirma exclusão deste cliente?')">
            <button type="submit" class="btn btn-outline-danger">
                <i class="bi bi-trash me-1"></i>Excluir
            </button>
        </form>
        <a href="/clientes/" class="btn btn-outline-secondary">
            <i class="bi bi-list me-1"></i>Voltar para lista
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
