<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo} + ' | Sistema de Aluguel de Carros'">Cliente | Sistema de Aluguel de Carros</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: 700; }
        .rendimento-row { background-color: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/clientes/"><i class="bi bi-car-front-fill me-2"></i>Aluguel de Carros</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="/clientes/"><i class="bi bi-people me-1"></i>Clientes</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5" style="max-width: 760px;">
    <div class="d-flex align-items-center mb-3">
        <a href="/clientes/" class="btn btn-sm btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
        <h2 class="mb-0" th:text="${titulo}">Cliente</h2>
    </div>

    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="${action}" method="post" novalidate>

                <h5 class="mb-3 text-muted">Dados Pessoais</h5>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="nome"
                           th:value="${form.nome}" placeholder="Nome completo" required maxlength="200"/>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">CPF <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="cpf"
                               th:value="${form.cpf}" placeholder="000.000.000-00" required maxlength="14"/>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">RG <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="rg"
                               th:value="${form.rg}" placeholder="RG" required/>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Endereço <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="endereco"
                           th:value="${form.endereco}" placeholder="Rua, número, bairro, cidade" required/>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Profissão <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="profissao"
                           th:value="${form.profissao}" placeholder="Profissão" required/>
                </div>

                <hr/>
                <h5 class="mb-1 text-muted">Rendimentos <small class="text-secondary fs-6">(máximo 3)</small></h5>
                <p class="text-muted small mb-3">Informe as fontes de renda do cliente. Deixe em branco os que não usar.</p>

                <div id="rendimentos-container">
                    <!-- Rendimento 0 -->
                    <div class="rendimento-row">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-7">
                                <label class="form-label fw-semibold">Fonte</label>
                                <input type="text" class="form-control" name="rendimentos[0].fonte"
                                       th:value="${form.rendimentos[0].fonte}" placeholder="Ex: Empresa XYZ"/>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Valor (R$)</label>
                                <input type="number" class="form-control" name="rendimentos[0].valor"
                                       th:value="${form.rendimentos[0].valor}" min="0" step="0.01" placeholder="0,00"/>
                            </div>
                        </div>
                    </div>
                    <!-- Rendimento 1 -->
                    <div class="rendimento-row">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-7">
                                <label class="form-label fw-semibold">Fonte</label>
                                <input type="text" class="form-control" name="rendimentos[1].fonte"
                                       th:value="${form.rendimentos[1].fonte}" placeholder="Ex: Empresa XYZ"/>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Valor (R$)</label>
                                <input type="number" class="form-control" name="rendimentos[1].valor"
                                       th:value="${form.rendimentos[1].valor}" min="0" step="0.01" placeholder="0,00"/>
                            </div>
                        </div>
                    </div>
                    <!-- Rendimento 2 -->
                    <div class="rendimento-row">
                        <div class="row g-2 align-items-end">
                            <div class="col-md-7">
                                <label class="form-label fw-semibold">Fonte</label>
                                <input type="text" class="form-control" name="rendimentos[2].fonte"
                                       th:value="${form.rendimentos[2].fonte}" placeholder="Ex: Empresa XYZ"/>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Valor (R$)</label>
                                <input type="number" class="form-control" name="rendimentos[2].valor"
                                       th:value="${form.rendimentos[2].valor}" min="0" step="0.01" placeholder="0,00"/>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-1"></i>Salvar
                    </button>
                    <a href="/clientes/" class="btn btn-outline-secondary">Cancelar</a>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
